name: deploy

# 提交即自动部署（镜像在服务器本地构建，不跨墙）：
#   推送到 master → runner checkout 源码 → scp 构建上下文到服务器 → SSH 生成 .env → docker compose build → up。
# 为什么源码走 runner→服务器 scp，而不在服务器 git clone：国内服务器 git clone github 会被 GFW 重置
#   (GnuTLS recv error -110)。runner 在 GitHub 内网,checkout 极快;源码仅 ~MB,经已打通的 SSH 通道 scp 很稳。
# 为什么不在 CI build 再推镜像：大镜像跨墙拉/推都不稳(GHCR blob 被墙、Docker Hub 公益源大层易抖、
#   TCR runner→国内上传大层会断)。改服务器本地 build:依赖走国内源(npmmirror,compose build-arg 注入)，
#   基础镜像走 daemon 镜像加速，全程不跨墙传大层。
# 与 our-chat 同机、同模式：① 通用非机密在 compose 默认值；② 机密 + 因环境而异统一放 GitHub Secrets。
#   ② 由本工作流在部署时注入、在服务器生成 .env，服务器零手工维护。
# 想用 dev 触发，把 branches 改成 [dev]；workflow_dispatch 支持手动触发。
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: 部署到服务器（本地构建）
    runs-on: ubuntu-latest
    environment: pro
    concurrency:
      group: deploy-agent-prod
      cancel-in-progress: false
    steps:
      # runner 在 GitHub 内网，checkout 本次提交的源码（作为待 scp 的构建上下文）
      - uses: actions/checkout@v4

      - name: 预检必填 Secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          OAUTH_ISSUER: ${{ secrets.OAUTH_ISSUER }}
          MILVUS_COS_ENDPOINT: ${{ secrets.MILVUS_COS_ENDPOINT }}
          MILVUS_COS_ACCESS_KEY: ${{ secrets.MILVUS_COS_ACCESS_KEY }}
          MILVUS_COS_SECRET_KEY: ${{ secrets.MILVUS_COS_SECRET_KEY }}
          MILVUS_COS_BUCKET: ${{ secrets.MILVUS_COS_BUCKET }}
        run: |
          miss=0
          for v in SSH_HOST SSH_USER SSH_PRIVATE_KEY POSTGRES_PASSWORD JWT_SECRET LLM_API_KEY OAUTH_ISSUER MILVUS_COS_ENDPOINT MILVUS_COS_ACCESS_KEY MILVUS_COS_SECRET_KEY MILVUS_COS_BUCKET; do
            if [ -z "${!v:-}" ]; then echo "❌ 缺少 Secret：$v"; miss=1; else echo "✓ Secret $v 已设置"; fi
          done
          if [ "$miss" -ne 0 ]; then
            echo "::error::有必填 Secret 读不到。确认它们都配在 environment『pro』的 Secrets 页下（本 job 已声明 environment: pro）。"
            exit 1
          fi
          echo "✅ 所有必填 Secret 齐全（environment: pro 读取正常）"

      # 把构建上下文(apps/node-server 源码 + docker/) scp 到服务器。仅 git 跟踪文本源码,~MB,经 SSH 很稳。
      # overwrite 覆盖旧源码;不删服务器侧专属文件(.env 不在源码里,scp 不动它)。
      - name: 同步构建上下文到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: 'apps/node-server,docker'
          target: ${{ secrets.DEPLOY_PATH || '/opt/agent-server' }}
          overwrite: true

      - name: 生成 .env + 本地构建 + 滚动重启
        uses: appleboy/ssh-action@v1.2.0
        env:
          GIT_SHA: ${{ github.sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/agent-server' }}
          # —— 机密 + 因环境而异，统一走 GitHub Secrets ——
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_CHAT_MODEL: ${{ secrets.LLM_CHAT_MODEL }}
          LLM_EMBED_MODEL: ${{ secrets.LLM_EMBED_MODEL }}
          MILVUS_VECTOR_SIZE: ${{ secrets.MILVUS_VECTOR_SIZE }}
          OAUTH_ISSUER: ${{ secrets.OAUTH_ISSUER }}
          MILVUS_COS_ENDPOINT: ${{ secrets.MILVUS_COS_ENDPOINT }}
          MILVUS_COS_ACCESS_KEY: ${{ secrets.MILVUS_COS_ACCESS_KEY }}
          MILVUS_COS_SECRET_KEY: ${{ secrets.MILVUS_COS_SECRET_KEY }}
          MILVUS_COS_BUCKET: ${{ secrets.MILVUS_COS_BUCKET }}
          MILVUS_COS_REGION: ${{ secrets.MILVUS_COS_REGION }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GIT_SHA,DEPLOY_PATH,POSTGRES_USER,POSTGRES_DB,POSTGRES_PASSWORD,JWT_SECRET,LLM_API_KEY,LLM_BASE_URL,LLM_CHAT_MODEL,LLM_EMBED_MODEL,MILVUS_VECTOR_SIZE,OAUTH_ISSUER,MILVUS_COS_ENDPOINT,MILVUS_COS_ACCESS_KEY,MILVUS_COS_SECRET_KEY,MILVUS_COS_BUCKET,MILVUS_COS_REGION
          # ssh-action 内是轮询(每 10s tail 一次,顺便给 SSH 通道喂流量防弱网空闲被重置),
          # 实际 build+up 由 ci-deploy.sh 用 setsid 脱离本会话后台跑(断连也跑完)。放宽到 35m 覆盖轮询上限。
          command_timeout: 35m
          script_stop: true
          # 全部服务器侧逻辑收敛进已 scp 的 docker/ci-deploy.sh(生成 .env → 后台 build+up → 轮询结果),
          # 这样 drone-ssh 的逐行包裹只作用于这一条调用,不会破坏脚本里的 heredoc/循环等复合结构。
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH}/docker"
            bash ci-deploy.sh
