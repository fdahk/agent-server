# ==========================================================================
# application-test.properties — 单元测试 / 集成测试专用配置
# ==========================================================================
#
# 【激活方式】在测试类上添加 @ActiveProfiles("test") 注解
#             Spring Boot 会自动加载这个文件代替主配置
#
# 【与 local 的区别】
#         - local profile 使用 H2 文件模式（数据保留）
#         - test profile 使用 H2 内存模式（测试结束数据自动清空）
#         这样每次跑测试都是干净的环境，测试之间不会互相影响
# ==========================================================================

# H2 内存数据库：mem: 前缀表示数据仅存在于内存中
# DB_CLOSE_DELAY=-1 → JVM 退出前不关闭数据库（避免连接池还在用时被关掉）
spring.datasource.url=jdbc:h2:mem:agent_server_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 测试环境同样执行 Flyway 迁移，保证表结构与生产一致
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis / RabbitMQ 保持默认连接（测试中如果不需要可以用 mock 替代）
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# 测试用 JWT 密钥（不需要很安全，只要够长能通过验证即可）
app.security.jwt-secret=test-secret-key-test-secret-key-test-secret-key
app.security.jwt-expire-seconds=7200

# AI Gateway 配置（测试中通常会 mock 掉 HTTP 调用，这里只是占位）
app.ai.default-model=qwen2.5:7b
app.ai.base-url=http://localhost:3101
app.ai.timeout-ms=120000
app.ai.api-key=

# 测试产物输出到 target/ 目录下（Maven 构建时会自动清理）
app.agent.output-root=target/test-agent-runs
