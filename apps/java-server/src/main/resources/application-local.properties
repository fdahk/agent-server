# ==========================================================================
# application-local.properties — 本地开发专用配置（local profile）
# ==========================================================================
#
# 【激活方式】启动时加参数 --spring.profiles.active=local
#             或在 IDEA 中设置 Active Profiles 为 "local"
#
# 【作用】本地开发时不需要安装 MySQL，使用 H2 内嵌数据库代替。
#         H2 是一个纯 Java 编写的嵌入式关系数据库，可以用文件或内存模式运行。
#         这里用的是文件模式（file:），数据保存在 .localdb/ 目录下，重启不丢失。
#
# 【原理】Spring Boot 的 profile 机制：
#         1. 先加载 application.properties（主配置）
#         2. 再加载 application-{profile}.properties（profile 配置）
#         3. profile 配置中的同名 key 会覆盖主配置中的值
#         所以这里只需要写需要覆盖的配置，其余配置继承自 application.properties
# ==========================================================================

# 使用 H2 文件数据库代替 MySQL
# MODE=MySQL → H2 会尽量兼容 MySQL 的 SQL 语法
# DATABASE_TO_LOWER=TRUE → 表名、列名转小写，避免大小写敏感问题
spring.datasource.url=jdbc:h2:file:./.localdb/agent_server;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway 同样可以在 H2 上执行迁移脚本（因为 H2 兼容 MySQL 语法）
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Agent 产物输出到项目目录下的 storage/ 文件夹
app.agent.output-root=storage/agent-runs
