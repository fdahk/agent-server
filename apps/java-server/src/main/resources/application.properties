# ==========================================================================
# application.properties — Spring Boot 主配置文件（默认 profile）
# ==========================================================================
#
# 【作用】Spring Boot 启动时会自动加载这个文件来初始化各种组件。
#         如果同时存在 application-{profile}.properties（如 application-local.properties），
#         Spring 会把两者合并，profile 文件的配置优先级更高。
#
# 【语法】${ENV_VAR:default} 的含义：
#         优先读取环境变量 ENV_VAR 的值；如果环境变量不存在，就使用冒号后面的默认值。
#         这样做的好处是：本地开发时无需设置环境变量就能直接跑起来，
#         生产部署时通过环境变量覆盖敏感信息（如密码、密钥）。
# ==========================================================================

# ------ 应用基本信息 ------
# 应用名称，会出现在日志和监控面板中
spring.application.name=java-server
# 服务监听的 HTTP 端口，${PORT:${SERVER_PORT:3000}} 表示：
#   先看 PORT 环境变量 → 再看 SERVER_PORT 环境变量 → 都没有就用 3000
server.port=${PORT:${SERVER_PORT:3000}}

# ------ MySQL 数据源 ------
# JDBC 连接字符串：协议://主机:端口/数据库名?参数
#   useUnicode + characterEncoding → 保证中文不乱码
#   serverTimezone → 时区设置，避免时间偏移
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/agent_server?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
# 告诉 Spring 使用哪个 JDBC 驱动类来连接 MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------ Flyway 数据库迁移 ------
# Flyway 是一个数据库版本管理工具：每次启动时自动执行 db/migration 下的 SQL 脚本，
# 让数据库表结构跟代码版本保持一致（类似 Git 管理代码，Flyway 管理数据库）
spring.flyway.enabled=true
# SQL 迁移脚本的存放位置（classpath: 表示在 src/main/resources/ 下查找）
spring.flyway.locations=classpath:db/migration

# ------ MyBatis ORM 配置 ------
# map-underscore-to-camel-case：数据库列名 user_name 自动映射到 Java 属性 userName
#   数据库命名习惯用下划线，Java 命名习惯用驼峰，这个配置让两者自动转换
mybatis.configuration.map-underscore-to-camel-case=true
# 每次查询默认抓取 100 行（适用于大结果集分批获取，减少内存占用）
mybatis.configuration.default-fetch-size=100
# SQL 执行超时：超过 30 秒自动中断，防止慢查询拖垮数据库
mybatis.configuration.default-statement-timeout=30

# ------ Redis 缓存 ------
# Redis 是一个内存数据库，常用来做缓存、分布式锁、Session 存储等
# 目前已引入依赖，后续可用于 Agent 运行状态缓存、接口限流等
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
# Redis 支持 16 个逻辑数据库（0-15），默认使用 0 号
spring.data.redis.database=${REDIS_DATABASE:0}

# ------ RabbitMQ 消息队列 ------
# RabbitMQ 是一个消息中间件，用于服务间异步通信
# 比如：Agent 执行完成后发一条消息，通知其他模块进行后续处理
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ------ Actuator 监控端点 ------
# Spring Boot Actuator 提供了一系列运维端点，可用于：
#   health  → 健康检查（如数据库连接是否正常）
#   info    → 应用信息
#   metrics → JVM、HTTP 请求等指标数据
#   prometheus → 导出指标给 Prometheus 监控系统采集
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# show-details=always → 健康检查返回详细信息（每个组件的状态）
management.endpoint.health.show-details=always

# ------ API 文档（Swagger / OpenAPI） ------
# SpringDoc 自动根据代码中的 Controller 生成 API 文档
# 访问 http://localhost:3000/swagger-ui.html 可以看到交互式 API 文档页面
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ------ JWT 安全配置 ------
# JWT（JSON Web Token）用于用户登录后的身份认证
# jwt-secret：签名密钥，用于生成和验证 Token（生产环境必须换成随机长字符串！）
app.security.jwt-secret=${JWT_SECRET:change-me-to-a-long-dev-secret-key-change-me}
# Token 有效期：7200 秒 = 2 小时，过期后用户需要重新登录
app.security.jwt-expire-seconds=${JWT_EXPIRE_SECONDS:7200}

# ------ AI Gateway 配置 ------
# 这组配置描述了 Java Core 如何通过 HTTP 调用 Node AI Gateway
# default-model：默认使用的 AI 模型名称
app.ai.default-model=${AI_DEFAULT_MODEL:qwen2.5:7b}
# base-url：Node AI Gateway 的访问地址（默认本地 3101 端口）
app.ai.base-url=${AI_GATEWAY_BASE_URL:http://localhost:3101}
# timeout-ms：调用 AI 的超时时间（120 秒），因为 AI 推理可能较慢
app.ai.timeout-ms=${AI_GATEWAY_TIMEOUT_MS:120000}
# api-key：Java → Node 内部通信的认证令牌（对应 Node 端的 INTERNAL_TOKEN）
app.ai.api-key=${AI_GATEWAY_API_KEY:}

# ------ Agent 运行时配置 ------
# Agent 执行后会生成报告文件（Markdown、JSON），存放在这个目录下
# ${user.dir} 是 JVM 的工作目录（通常是项目根目录）
app.agent.output-root=${AGENT_OUTPUT_ROOT:${user.dir}/storage/agent-runs}
