# 使用方式：
#   1. cp .env.docker.example .env.docker
#   2. docker compose --env-file .env.docker up -d
#   3. docker compose --env-file .env.docker logs -f     # 查看日志
#   4. docker compose --env-file .env.docker down         # 停止并移除
#
# 服务清单（M0 起,单 Node 服务架构,详见 docs/项目重构方案/02 §6）：
#   redis        → 6379   BullMQ 队列 + Pub/Sub backplane + 缓存
#   node-server  → 3101   单 Node 服务（NestJS,后续按 web/worker 角色拆分扩容）
#
# Postgres / Qdrant 等基础设施将在后续 commit 加入(M0 commit 4)。
# Ollama 跑在宿主机上(本地开发),容器内通过 host.docker.internal 访问。
# ==========================================================================

services:
  # ==================== 基础设施 ====================

  redis:
    image: redis:7-alpine
    container_name: agent-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 应用服务 ====================

  node-server:
    build:
      context: ./apps/node-server
      dockerfile: Dockerfile
    container_name: agent-node-server
    restart: unless-stopped
    ports:
      - "${NODE_PORT:-3101}:3101"
    environment:
      NODE_ENV: production
      PORT: 3101
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-me-to-a-secure-token}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OLLAMA_HTTP_TIMEOUT_MS: ${OLLAMA_HTTP_TIMEOUT_MS:-120000}
      AGENT_OUTPUT_ROOT: /app/storage/agent-runs
      AGENT_MAX_FILES: ${AGENT_MAX_FILES:-12}
      AGENT_MAX_FILE_SIZE: ${AGENT_MAX_FILE_SIZE:-262144}
      AGENT_MAX_TOTAL_BYTES: ${AGENT_MAX_TOTAL_BYTES:-2097152}
      AGENT_MAX_RESOURCE_CHARS: ${AGENT_MAX_RESOURCE_CHARS:-12000}
      HTTP_CLIENT_TIMEOUT_MS: ${HTTP_CLIENT_TIMEOUT_MS:-30000}
      AGENT_HTTP_TIMEOUT_MS: ${AGENT_HTTP_TIMEOUT_MS:-30000}
    volumes:
      - node-storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3101/api || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  node-storage:
