# 使用方式：
#   1. cp .env.docker.example .env.docker
#   2. docker compose --env-file .env.docker up -d
#   3. docker compose --env-file .env.docker logs -f     # 查看日志
#   4. docker compose --env-file .env.docker down         # 停止并移除
#
# 服务清单（单 Node 服务架构,详见 docs/项目重构方案/02 §6）：
#   postgres     → 5432   关系库(Prisma)
#   redis        → 6379   BullMQ 队列 + Pub/Sub backplane + 缓存
#   qdrant       → 6333   向量库(REST 6333 / gRPC 6334)
#   node-server  → 3101   单 Node 服务(NestJS,后续按 web/worker 角色拆分扩容)
#
# Ollama 跑在宿主机上(本地开发),容器内通过 host.docker.internal 访问。
# ==========================================================================

services:
  # ==================== 基础设施 ====================

  postgres:
    image: postgres:16-alpine
    container_name: agent-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent}
      POSTGRES_DB: ${POSTGRES_DB:-agent_server}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-agent_server}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agent-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agent-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    # 注:qdrant 官方镜像无 curl/wget,不便容器内 healthcheck;
    # 依赖应用层启动时 ensureCollection 做就绪校验(M0 commit 7)。

  # ==================== 应用服务 ====================

  node-server:
    build:
      context: ./apps/node-server
      dockerfile: Dockerfile
    container_name: agent-node-server
    restart: unless-stopped
    ports:
      - "${NODE_PORT:-3101}:3101"
    environment:
      NODE_ENV: production
      PORT: 3101
      # 关系库(容器间用服务名)
      DATABASE_URL: postgres://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-agent}@postgres:5432/${POSTGRES_DB:-agent_server}
      # Redis
      REDIS_URL: redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379
      # 向量库
      QDRANT_URL: http://qdrant:6333
      # LLM(OpenAI 兼容,默认指向宿主机 Ollama,详见 docs/01 §7)
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-qwen2.5:7b}
      LLM_EMBED_MODEL: ${LLM_EMBED_MODEL:-nomic-embed-text}
      # 鉴权
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-in-production}
      JWT_EXPIRE_SECONDS: ${JWT_EXPIRE_SECONDS:-7200}
      AGENT_OUTPUT_ROOT: /app/storage/agent-runs
      AGENT_MAX_FILES: ${AGENT_MAX_FILES:-12}
      AGENT_MAX_FILE_SIZE: ${AGENT_MAX_FILE_SIZE:-262144}
      AGENT_MAX_TOTAL_BYTES: ${AGENT_MAX_TOTAL_BYTES:-2097152}
      AGENT_MAX_RESOURCE_CHARS: ${AGENT_MAX_RESOURCE_CHARS:-12000}
      HTTP_CLIENT_TIMEOUT_MS: ${HTTP_CLIENT_TIMEOUT_MS:-30000}
      AGENT_HTTP_TIMEOUT_MS: ${AGENT_HTTP_TIMEOUT_MS:-30000}
    volumes:
      - node-storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3101/api || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  node-storage:
